<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Firefox Select Bug Repro</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/morphdom@2.7.2/dist/morphdom-umd.min.js"></script>
</head>
<body class="p-10 bg-base-200 min-h-screen">
    <div class="max-w-5xl mx-auto bg-base-100 p-8 rounded-box shadow-xl border border-base-300">
        <h1 class="text-3xl font-bold mb-6 text-primary">Minimal Repro</h1>
        
        <div class="flex gap-4 mb-8 border-b border-base-300 pb-6">
            <button onclick="runMorphdom()" class="btn btn-primary">1. Update via Morphdom</button>
            <button onclick="runVanilla()" class="btn btn-secondary">2. Update via Vanilla DOM</button>
            <button onclick="window.location.reload()" class="btn btn-ghost">Reset</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- 1. Static Control -->
            <div class="p-4 border border-base-300 rounded-lg">
                <h2 class="font-bold text-lg mb-4 text-base-content/70">Static (Control)</h2>
                <label>
                    <span class="label-text block mb-1">Static Select</span>
                    <select class="select select-bordered w-full">
                        <option>Original A</option>
                        <option>Original B</option>
                    </select>
                </label>
            </div>

            <!-- 2. Morphdom Container -->
            <div class="p-4 border border-primary rounded-lg bg-primary/5">
                <h2 class="font-bold text-lg mb-4 text-primary">Morphdom Target</h2>
                <div id="morph-target">
                    <label>
                        <span class="label-text block mb-1">Morphdom Select</span>
                        <select class="select select-bordered w-full">
                            <option>Initial 1</option>
                            <option>Initial 2</option>
                        </select>
                    </label>
                </div>
            </div>

            <!-- 3. Vanilla DOM Container -->
            <div class="p-4 border border-secondary rounded-lg bg-secondary/5">
                <h2 class="font-bold text-lg mb-4 text-secondary">Vanilla DOM Target</h2>
                <div id="vanilla-target">
                    <label>
                        <span class="label-text block mb-1">Vanilla Select</span>
                        <select class="select select-bordered w-full">
                            <option>Initial X</option>
                            <option>Initial Y</option>
                        </select>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script>
        function runMorphdom() {
            const target = document.getElementById('morph-target');
            const newHTML = `
            <div id="morph-target">
                <label>
                    <span class="label-text block mb-1 font-bold text-primary">Morphdom Select (Updated)</span>
                    <select class="select select-bordered w-full border-primary">
                        <option>Updated 1</option>
                        <option selected>Updated 2 (Selected)</option>
                    </select>
                </label>
            </div>`;
            
            const temp = document.createElement('div');
            temp.innerHTML = newHTML.trim();
            morphdom(target, temp.firstChild);
        }

        function runVanilla() {
            const target = document.getElementById('vanilla-target');
            target.innerHTML = `
                <label>
                    <span class="label-text block mb-1 font-bold text-secondary">Vanilla Select (Updated)</span>
                    <select class="select select-bordered w-full border-secondary">
                        <option>Updated X</option>
                        <option selected>Updated Y (Selected)</option>
                    </select>
                </label>
            `;
        }
    </script>
</body>
</html>
