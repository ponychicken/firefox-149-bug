<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Firefox DaisyUI Select Bug</title>
    <!-- DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-10 bg-base-200 min-h-screen">
    <div class="max-w-4xl mx-auto bg-base-100 p-8 rounded-box shadow-xl border border-base-300">
        <h1 class="text-3xl font-bold mb-6 text-primary text-center">Firefox Select Layout Bug Repro</h1>
        
        <div class="mb-8 grid grid-cols-2 md:grid-cols-4 gap-2">
            <button onclick="runReplaceChildWithClone()" class="btn btn-primary btn-sm">1. cloneNode + replaceChild</button>
            <button onclick="runReplaceChildWithFragment()" class="btn btn-primary btn-sm">2. Fragment + replaceChild</button>
            <button onclick="runAppendChild()" class="btn btn-secondary btn-sm">3. appendChild</button>
            <button onclick="runInsertAdjacentHTML()" class="btn btn-secondary btn-sm">4. insertAdjacentHTML</button>
            <button onclick="runOuterHTML()" class="btn btn-accent btn-sm">5. outerHTML</button>
            <button onclick="runInnerHTML()" class="btn btn-accent btn-sm">6. innerHTML</button>
            <button onclick="window.location.reload()" class="btn btn-ghost btn-sm col-span-2">Reset</button>
        </div>

        <div id="target-container" class="bg-base-200 p-6 rounded-lg min-h-[200px]">
            <div id="target" class="p-4 border-2 border-dashed border-base-300 rounded-lg text-center">
                Target Element
            </div>
        </div>
    </div>

    <!-- Template holding our payload -->
    <template id="payload">
        <div id="target" class="p-4 border-2 border-solid border-success rounded-lg bg-base-100">
            <div class="fieldset">
                <label>
                    <span class="label mb-1 font-bold text-success">Nested Select</span>
                    <select class="select select-bordered select-success w-full">
                        <option selected>Initial Value</option>
                        <option>Other Value</option>
                    </select>
                </label>
            </div>

            <div class="fieldset mt-6">
                <label for="unnested" class="label mb-1 font-bold text-success">Unnested Select</label>
                <select id="unnested" class="select select-bordered select-success w-full">
                    <option selected>Initial Value</option>
                    <option>Other Value</option>
                </select>
            </div>
        </div>
    </template>

    <script>
        function runReplaceChildWithClone() {
            const target = document.getElementById('target');
            const template = document.getElementById('payload');
            // Exactly what morphdom does internally: node.cloneNode(true) and then replaceChild
            const newNode = template.content.firstElementChild.cloneNode(true);
            target.parentNode.replaceChild(newNode, target);
        }

        function runReplaceChildWithFragment() {
            const target = document.getElementById('target');
            const template = document.getElementById('payload');
            const fragment = template.content.cloneNode(true);
            const newNode = fragment.firstElementChild;
            target.parentNode.replaceChild(newNode, target);
        }

        function runAppendChild() {
            const container = document.getElementById('target-container');
            const template = document.getElementById('payload');
            // Clear current content
            container.innerHTML = '';
            const newNode = template.content.firstElementChild.cloneNode(true);
            container.appendChild(newNode);
        }

        function runInsertAdjacentHTML() {
            const container = document.getElementById('target-container');
            const template = document.getElementById('payload');
            container.innerHTML = '';
            container.insertAdjacentHTML('afterbegin', template.innerHTML);
        }

        function runOuterHTML() {
            const target = document.getElementById('target');
            const template = document.getElementById('payload');
            target.outerHTML = template.innerHTML;
        }

        function runInnerHTML() {
            const container = document.getElementById('target-container');
            const template = document.getElementById('payload');
            container.innerHTML = template.innerHTML;
        }
    </script>
</body>
</html>
