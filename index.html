<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Firefox DaisyUI Select Bug</title>
    <!-- DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-10 bg-base-200 min-h-screen">
    <div class="max-w-xl mx-auto bg-base-100 p-8 rounded-box shadow-xl border border-base-300">
        <h1 class="text-3xl font-bold mb-6 text-primary">Minimal Repro</h1>
        
        <div class="mb-8 flex gap-2">
            <button onclick="runOuterHTML()" class="btn btn-primary btn-sm">1. Replace via outerHTML</button>
            <button onclick="runReplaceChild()" class="btn btn-secondary btn-sm">2. Replace via replaceChild</button>
            <button onclick="window.location.reload()" class="btn btn-ghost btn-sm">Reset</button>
        </div>

        <div id="target-container">
            <div id="target" class="p-4 border-2 border-dashed border-base-300 rounded-lg">
                Placeholder: clicking a button will replace this entire div.
            </div>
        </div>
    </div>

    <!-- Template holding our payload -->
    <template id="payload">
        <div id="target" class="p-4 border-2 border-solid border-success rounded-lg">
            <div class="fieldset">
                <label>
                    <span class="label mb-1 font-bold text-success">Nested Select</span>
                    <select class="select select-bordered select-success w-full">
                        <option selected>Initial Value</option>
                        <option>Other Value</option>
                    </select>
                </label>
            </div>

            <div class="fieldset mt-6">
                <label for="unnested" class="label mb-1 font-bold text-success">Unnested Select</label>
                <select id="unnested" class="select select-bordered select-success w-full">
                    <option selected>Initial Value</option>
                    <option>Other Value</option>
                </select>
            </div>
        </div>
    </template>

    <script>
        function runOuterHTML() {
            const target = document.getElementById('target');
            const template = document.getElementById('payload');
            target.outerHTML = template.innerHTML;
        }

        function runReplaceChild() {
            const target = document.getElementById('target');
            const template = document.getElementById('payload');
            
            const temp = document.createElement('div');
            temp.appendChild(template.content.cloneNode(true));
            const newNode = temp.firstElementChild;
            
            target.parentNode.replaceChild(newNode, target);
        }
    </script>
</body>
</html>
